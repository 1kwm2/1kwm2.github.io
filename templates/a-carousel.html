<div class="container">


    <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img class=" d-block w-100" style=" filter: brightness(50%); width: 100% !important; height: 45vh;"
                    src='static/img/auditoriasE.jpg' alt="Second slide">
                <div class="container">
                    <div class="carousel-caption text-start">
                        <h1>Auditorías Energéticas</h1>
                        <p>Medidas de Ahorro de la Energía (MAEs) con optima Tasa interna de
                            retorno (TIR).</p>
                        <p >
                            <!-- <a class="btn btn-lg btn-primary" href="#" role="button">Saber mas</a> -->
                        </p>
                    </div>
                </div>

            </div>

            {% for _, item in data.carousels.items() %}

            <div class="carousel-item">
                <img class=" d-block w-100" style=" filter: brightness(50%); width: 100% !important; height: 45vh;" src='{{ item.img }}'
                    alt="Second slide">
                <div class="container">
                    <div class="carousel-caption text-start">
                        <h1>{{ item.title }}</h1>
                        <p>{{ item.text }}</p>
                        <p></p>
                        <p><a class="btn btn-lg btn-primary" href="#" onclick="document.getElementById('boton_{{ item.id }}').click()" role="button">Ir</a></p>
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>

        <a class="carousel-control-prev" href="#myCarousel" role="button" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </a>
        <a class="carousel-control-next" href="#myCarousel" role="button" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </a>
    </div>
</div>

<br>
